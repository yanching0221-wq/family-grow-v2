<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我們這一家</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#C8835A', light: '#F5EDE6', medium: '#E8C4A8' }
          }
        }
      }
    }
  </script>
  <style>
    body { background: #FAF7F4; font-family: -apple-system, 'Noto Sans TC', sans-serif; }
    .tab-btn.active { color: #C8835A; border-bottom: 2px solid #C8835A; }
    .task-checkbox { width:28px; height:28px; border:2px solid #C8835A; border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .task-checkbox.checked { background:#C8835A; }
    .badge { background:#e53e3e; color:white; border-radius:9999px; padding:1px 7px; font-size:12px; }
  </style>
</head>
<body class="max-w-md mx-auto min-h-screen">

  <!-- PAGE: welcome -->
  <div id="page-welcome" class="page hidden flex flex-col items-center justify-center min-h-screen p-8">
    <div class="text-6xl mb-6">⭐</div>
    <h1 class="text-3xl font-bold mb-1">我們這一家</h1>
    <p class="text-gray-400 text-sm mb-12">FAMILY GROW TOGETHER</p>
    <div id="welcome-buttons" class="w-full space-y-4">
      <!-- 由 JS 動態產生 -->
    </div>
  </div>

  <!-- PAGE: setup (first time) -->
  <div id="page-setup" class="page hidden p-8">
    <div class="flex flex-col items-center pt-8">
      <div class="text-6xl mb-6">⭐</div>
      <h2 class="text-2xl font-bold mb-2">歡迎來到我們這一家</h2>
      <p class="text-gray-400 text-sm text-center mb-8">首次使用需要設定<br>爸媽與小孩各自的通關密語</p>
      <div class="w-full bg-brand-light rounded-2xl p-4 mb-6 space-y-1 text-sm">
        <div>🔒 爸媽密碼：管理後台專用</div>
        <div>🧒 小孩：點名字直接進入</div>
        <div>💡 資料存在您的裝置上</div>
      </div>
      <div class="w-full space-y-3 mb-6">
        <div class="bg-white rounded-2xl p-4 space-y-3 shadow-sm">
          <div class="font-bold text-sm text-gray-600">🐻 爸爸 / 媽媽</div>
          <input id="setup-parent-pin" type="password" maxlength="4" placeholder="設定4位密碼"
            class="w-full border border-gray-200 rounded-xl p-3 text-center text-xl tracking-widest focus:outline-none focus:border-brand">
        </div>
        <div class="bg-white rounded-2xl p-4 space-y-3 shadow-sm">
          <div class="font-bold text-sm text-gray-600">🦁 小孩1 名字</div>
          <input id="setup-child1-name" placeholder="例：小明" maxlength="6"
            class="w-full border border-gray-200 rounded-xl p-3 focus:outline-none focus:border-brand">
        </div>
        <div class="bg-white rounded-2xl p-4 space-y-3 shadow-sm">
          <div class="font-bold text-sm text-gray-600">🐯 小孩2 名字</div>
          <input id="setup-child2-name" placeholder="例：小花" maxlength="6"
            class="w-full border border-gray-200 rounded-xl p-3 focus:outline-none focus:border-brand">
        </div>
        <div class="bg-white rounded-2xl p-4 space-y-3 shadow-sm">
          <div class="font-bold text-sm text-gray-600">🐼 小孩3 名字</div>
          <input id="setup-child3-name" placeholder="請輸入名字" maxlength="6"
            class="w-full border border-gray-200 rounded-xl p-3 focus:outline-none focus:border-brand">
        </div>
      </div>
      <button onclick="saveSetup()" class="w-full bg-brand text-white py-4 rounded-2xl font-bold text-lg">開始設定 →</button>
    </div>
  </div>

  <!-- PAGE: child-login -->
  <div id="page-child-login" class="page hidden p-8">
    <button onclick="showPage('page-welcome')" class="text-gray-400 mb-8 block">‹ 返回</button>
    <div class="flex flex-col items-center pt-8">
      <div id="child-login-emoji" class="text-6xl mb-4">🧒</div>
      <h2 id="child-login-name" class="text-2xl font-bold mb-1">小勇者</h2>
      <p class="text-gray-400 text-sm mb-8">請輸入通關密語</p>
      <input id="child-pin-input" type="password" maxlength="4" placeholder="● ● ● ●"
        class="w-full border border-gray-200 rounded-xl p-4 text-center text-2xl tracking-widest mb-3 focus:outline-none focus:border-brand">
      <p id="child-login-error" class="text-red-400 text-sm mb-4 hidden">密碼錯誤，請再試一次</p>
      <button onclick="loginChild()" class="w-full bg-brand text-white py-4 rounded-2xl font-bold text-lg">進入村莊</button>
    </div>
  </div>

  <!-- PAGE: parent-login -->
  <div id="page-parent-login" class="page hidden p-8">
    <button onclick="showPage('page-welcome')" class="text-gray-400 mb-8 block">‹ 返回</button>
    <div class="flex flex-col items-center pt-8">
      <div class="text-6xl mb-4">🐻</div>
      <h2 class="text-2xl font-bold mb-1">爸爸 / 媽媽</h2>
      <p class="text-gray-400 text-sm mb-8">請輸入通關密語</p>
      <input id="parent-pin-input" type="password" maxlength="4" placeholder="● ● ● ●"
        class="w-full border border-gray-200 rounded-xl p-4 text-center text-2xl tracking-widest mb-3 focus:outline-none focus:border-brand">
      <p id="parent-login-error" class="text-red-400 text-sm mb-4 hidden">密碼錯誤，請再試一次</p>
      <button onclick="loginParent()" class="w-full bg-brand text-white py-4 rounded-2xl font-bold text-lg">進入村莊</button>
    </div>
  </div>

  <!-- PAGE: child-main -->
  <div id="page-child-main" class="page hidden">
    <div id="child-banner" class="bg-brand text-white px-5 py-3 text-sm flex items-center gap-2 min-h-[44px]">
      <span>💬</span><span id="banner-text">今天記得說好話，讓別人開心！</span>
    </div>
    <div class="px-5 pt-4 pb-2 flex items-start justify-between">
      <div class="flex-1 mr-4">
        <p class="text-gray-400 text-sm" id="child-name-display">小勇者</p>
        <h2 class="text-2xl font-bold">習慣養成</h2>
        <div class="mt-2">
          <div class="flex justify-between text-sm text-gray-400 mb-1">
            <span>今日進度</span>
            <span id="child-progress-text">0 / 0</span>
          </div>
          <div class="h-2 bg-gray-200 rounded-full">
            <div id="child-progress-bar" class="h-2 bg-brand rounded-full transition-all" style="width:0%"></div>
          </div>
        </div>
      </div>
      <div class="bg-yellow-50 border border-yellow-200 rounded-xl px-4 py-2 text-center shrink-0">
        <div class="text-xs text-yellow-600">金幣存量</div>
        <div id="child-coins" class="text-2xl font-bold text-yellow-500">0</div>
      </div>
    </div>
    <div class="flex border-b border-gray-100 px-5 mt-2 text-sm overflow-x-auto">
      <button class="tab-btn active py-3 mr-5 whitespace-nowrap" onclick="switchChildTab('tasks', this)">每日任務</button>
      <button class="tab-btn py-3 mr-5 text-gray-400 whitespace-nowrap" onclick="switchChildTab('rewards', this)">獎勵兌換</button>
      <button class="tab-btn py-3 mr-5 text-gray-400 whitespace-nowrap relative" onclick="switchChildTab('my-rewards', this)">
        我的獎勵<span id="my-rewards-badge" class="badge ml-1 hidden">0</span>
      </button>
      <button class="tab-btn py-3 text-gray-400 whitespace-nowrap" onclick="switchChildTab('history', this)">歷程記錄</button>
    </div>
    <div id="child-tab-tasks" class="child-tab px-5 pt-4 pb-24"></div>
    <div id="child-tab-rewards" class="child-tab hidden px-5 pt-4 pb-24"></div>
    <div id="child-tab-my-rewards" class="child-tab hidden px-5 pt-4 pb-24"></div>
    <div id="child-tab-history" class="child-tab hidden px-5 pt-4 pb-24"></div>
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 py-3 text-center">
      <button onclick="logout()" class="text-gray-400 text-sm">登出</button>
    </div>
  </div>

  <!-- PAGE: parent-main -->
  <div id="page-parent-main" class="page hidden">
    <div class="px-5 pt-6 pb-2">
      <p class="text-gray-400 text-sm">爸爸 / 媽媽</p>
      <h2 class="text-2xl font-bold">家庭戰情室</h2>
    </div>
    <div class="flex border-b border-gray-100 px-5 text-sm overflow-x-auto">
      <button class="tab-btn active py-3 mr-5 whitespace-nowrap" onclick="switchParentTab('overview', this)">總覽概況</button>
      <button class="tab-btn py-3 mr-5 text-gray-400 whitespace-nowrap relative" onclick="switchParentTab('review', this)">
        審核中心<span id="review-badge" class="badge ml-1">0</span>
      </button>
      <button class="tab-btn py-3 mr-5 text-gray-400 whitespace-nowrap" onclick="switchParentTab('tasks', this)">小孩任務</button>
      <button class="tab-btn py-3 mr-5 text-gray-400 whitespace-nowrap" onclick="switchParentTab('rewards-mgmt', this)">溫馨獎勵</button>
      <button class="tab-btn py-3 text-gray-400 whitespace-nowrap" onclick="switchParentTab('messages', this)">貼心提醒</button>
    </div>
    <div id="parent-tab-overview" class="parent-tab px-5 pt-4 pb-24"></div>
    <div id="parent-tab-review" class="parent-tab hidden px-5 pt-4 pb-24"></div>
    <div id="parent-tab-tasks" class="parent-tab hidden px-5 pt-4 pb-24"></div>
    <div id="parent-tab-rewards-mgmt" class="parent-tab hidden px-5 pt-4 pb-24"></div>
    <div id="parent-tab-messages" class="parent-tab hidden px-5 pt-4 pb-24"></div>
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 py-3 text-center">
      <button onclick="logout()" class="text-gray-400 text-sm">登出</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
